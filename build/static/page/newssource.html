<script>
    var NowPage = "NEWSSOURCE";
    var UI_Link;

    function InitPage() {
        UI_Link = {};
        UI_Link['zhihu'] = document.getElementById('ZhihuNews');
        UI_Link['coolapk'] = document.getElementById('CoolapkNews');
        UI_Link['juejin'] = document.getElementById('JuejinNews');
        UI_Link['weibo'] = document.getElementById('WeiboNews');
        UI_Link['toutiao'] = document.getElementById('ToutiaoNews');
        UI_Link['thepaper'] = document.getElementById('ThepaperNews');
        UI_Link['hackernews'] = document.getElementById('HackernewsNews');
        UI_Link['cls-hot'] = document.getElementById('Cls-hotNews');
        UI_Link['freebuf'] = document.getElementById('FreebufNews');
        if (false) {
            Object.entries(UI_Link).forEach(([key, element]) => {
                updateNews(key);
            });
        } else {
            updateNews2();
        }
        // updateWordsCloud();
    }

    function UnPage() {
        UI_Link = null;
    }

    async function updateNews(id) {
        try {
            const res = await fetch(`/api/newsnow?id=${id}`);
            if (!res.ok) throw new Error(res.statusText);
            const t = await res.json();
            const ul = document.createElement('ul');
            let i = 0;
            t.forEach((now) => {
                const p = document.createElement('li');
                p.innerText = now['title'];
                p.style.setProperty('--i', i++);
                p.onclick = () => {
                    window.open(now.url, "_blank");
                };
                ul.appendChild(p);
            });
            if (NowPage != "NEWSSOURCE") return;
            UI_Link[id].innerHTML = ``;
            UI_Link[id].appendChild(ul);
        } catch (err) {
            if (NowPage != "NEWSSOURCE") return;
            if (err.message == "Failed to fetch") err.message = "网络错误喵<br>≧ ﹏ ≦";
            UI_Link[id].innerHTML = `<div style="width: 100%;display: flex;justify-content: center;align-items: center;flex-direction: column;"><h3 style="text-align: center;">${err.message}</h3></div>`;
            console.error(err);
        }
    }

    async function updateNews2() {
        try {
            const res = await fetch(`/api/newsnow2`);
            if (!res.ok) throw new Error(res.statusText);
            const t = await res.json();
            t.forEach((news) => {
                if (!(news.id in UI_Link)) return;
                if (news.status == "success" || news.status == "cache") {
                    const ul = document.createElement('ul');
                    let i = 0;
                    news.items.forEach((now) => {
                        const p = document.createElement('li');
                        p.innerText = now['title'];
                        p.style.setProperty('--i', i++);
                        p.onclick = () => {
                            window.open(now.url, "_blank");
                        };
                        ul.appendChild(p);
                    });

                    if (NowPage != "NEWSSOURCE") return;
                    UI_Link[news.id].innerHTML = ``;
                    UI_Link[news.id].appendChild(ul);
                }
            });
        } catch (err) {
            // UI_Link[id].innerHTML = `<div style="width: 100%;display: flex;justify-content: center;align-items: center;flex-direction: column;"><h3>加载不出来喵<br>${err.message}</h3></div>`;
            console.error(err);
        }
    }
</script>
